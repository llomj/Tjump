<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sound</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 1rem;
    }
    h1 { margin: 0; font-size: 1.75rem; }
    .buttons { display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center; }
    button {
      padding: 0.875rem 1.5rem;
      font-size: 1rem;
      border: none;
      border-radius: 1rem;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.1s, opacity 0.15s;
    }
    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.98); }
    .btn-star { background: linear-gradient(to bottom right, #6366f1, #8b5cf6); color: white; box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4); }
    .btn-correct { background: rgba(16, 185, 129, 0.3); color: #34d399; border: 2px solid #10b981; }
    .btn-wrong { background: rgba(244, 63, 94, 0.2); color: #fb7185; border: 2px solid #f43f5e; }
    p { color: #94a3b8; font-size: 0.9rem; margin: 0; text-align: center; }
    .note { font-size: 0.75rem; color: #64748b; max-width: 360px; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <h1>Sound</h1>
  <p>Preview the sounds used in the app. In the app, use Settings to turn sound and haptic feedback on or off.</p>
  <div class="buttons">
    <button id="playStar" class="btn-star">Star celebration</button>
    <button id="playCorrect" class="btn-correct">Correct answer</button>
    <button id="playWrong" class="btn-wrong">Wrong answer</button>
  </div>
  <p id="msg" style="min-height: 1.5rem; margin-top: 0.25rem;"></p>
  <p class="note">If no sound: open via a local server (e.g. npx serve .) or allow autoplay in browser settings.</p>

  <script>
    var AudioContextClass = window.AudioContext || window.webkitAudioContext;

    function setMsg(text, isError) {
      var msg = document.getElementById('msg');
      msg.textContent = text;
      msg.style.color = isError ? '#f87171' : '#94a3b8';
    }

    function playStar() {
      setMsg('Playing…');
      if (!AudioContextClass) { setMsg('Web Audio not supported', true); return; }
      try {
        var ctx = new AudioContextClass();
        if (ctx.state === 'suspended') ctx.resume();
        var now = ctx.currentTime;
        var masterGain = ctx.createGain();
        masterGain.connect(ctx.destination);
        masterGain.gain.setValueAtTime(0.9, now);
        masterGain.gain.linearRampToValueAtTime(0.01, now + 2.2);
        var punch = function(freq, start, dur, vol) {
          var sq = ctx.createOscillator(), tri = ctx.createOscillator();
          var g1 = ctx.createGain(), g2 = ctx.createGain();
          sq.type = 'square'; tri.type = 'triangle';
          sq.frequency.setValueAtTime(freq, now + start);
          tri.frequency.setValueAtTime(freq, now + start);
          g1.gain.setValueAtTime(vol, now + start);
          g1.gain.linearRampToValueAtTime(0.01, now + start + dur);
          g2.gain.setValueAtTime(vol * 0.5, now + start);
          g2.gain.linearRampToValueAtTime(0.01, now + start + dur);
          sq.connect(g1); tri.connect(g2);
          g1.connect(masterGain); g2.connect(masterGain);
          sq.start(now + start); tri.start(now + start);
          sq.stop(now + start + dur + 0.02); tri.stop(now + start + dur + 0.02);
        };
        var C5 = 523.25, E5 = 659.25, G5 = 783.99, C6 = 1046.5, E6 = 1318.51, G6 = 1567.98;
        punch(C5, 0, 0.07, 0.45); punch(E5, 0.09, 0.07, 0.45); punch(G5, 0.18, 0.07, 0.45);
        punch(C6, 0.27, 0.12, 0.5); punch(E5, 0.42, 0.07, 0.45); punch(G5, 0.51, 0.07, 0.45);
        punch(C6, 0.6, 0.07, 0.45); punch(E6, 0.69, 0.14, 0.5); punch(G5, 0.86, 0.07, 0.45);
        punch(C6, 0.95, 0.07, 0.45); punch(E6, 1.04, 0.07, 0.45); punch(G6, 1.13, 0.18, 0.5);
        punch(C6, 1.34, 0.22, 0.5); punch(G5, 1.58, 0.12, 0.45);
        setTimeout(function() { ctx.close(); setMsg(''); }, 2400);
      } catch (e) { setMsg('Error: ' + (e.message || e), true); }
    }

    function playCorrect() {
      setMsg('Playing…');
      if (!AudioContextClass) { setMsg('Web Audio not supported', true); return; }
      try {
        var ctx = new AudioContextClass();
        if (ctx.state === 'suspended') ctx.resume();
        var now = ctx.currentTime;
        var masterGain = ctx.createGain();
        masterGain.connect(ctx.destination);
        masterGain.gain.setValueAtTime(0.6, now);
        masterGain.gain.linearRampToValueAtTime(0.01, now + 0.35);
        var tone = function(freq, start, dur, vol) {
          var sq = ctx.createOscillator(), g = ctx.createGain();
          sq.type = 'square';
          sq.frequency.setValueAtTime(freq, now + start);
          g.gain.setValueAtTime(vol, now + start);
          g.gain.linearRampToValueAtTime(0.01, now + start + dur);
          sq.connect(g); g.connect(masterGain);
          sq.start(now + start); sq.stop(now + start + dur + 0.02);
        };
        tone(659.25, 0, 0.08, 0.4);
        tone(783.99, 0.08, 0.08, 0.4);
        tone(1046.5, 0.16, 0.12, 0.45);
        setTimeout(function() { ctx.close(); setMsg(''); }, 400);
      } catch (e) { setMsg('Error: ' + (e.message || e), true); }
    }

    function playWrong() {
      setMsg('Playing…');
      if (!AudioContextClass) { setMsg('Web Audio not supported', true); return; }
      try {
        var ctx = new AudioContextClass();
        if (ctx.state === 'suspended') ctx.resume();
        var now = ctx.currentTime;
        var masterGain = ctx.createGain();
        masterGain.connect(ctx.destination);
        masterGain.gain.setValueAtTime(0.5, now);
        masterGain.gain.linearRampToValueAtTime(0.01, now + 0.3);
        var osc = ctx.createOscillator(), g = ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(120, now);
        osc.frequency.linearRampToValueAtTime(80, now + 0.3);
        g.gain.setValueAtTime(0.35, now);
        g.gain.linearRampToValueAtTime(0.01, now + 0.3);
        osc.connect(g); g.connect(masterGain);
        osc.start(now); osc.stop(now + 0.35);
        setTimeout(function() { ctx.close(); setMsg(''); }, 400);
      } catch (e) { setMsg('Error: ' + (e.message || e), true); }
    }

    document.getElementById('playStar').onclick = playStar;
    document.getElementById('playCorrect').onclick = playCorrect;
    document.getElementById('playWrong').onclick = playWrong;
  </script>
</body>
</html>
