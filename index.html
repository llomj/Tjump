<!DOCTYPE html>
<html lang="en">
<head>
    <script>
      (function() {
        // Set theme before paint to avoid flash (reads localStorage)
        try {
          var raw = localStorage.getItem('python_exercises_theme_v1');
          // Migration: old boolean storage ("true" = light)
          if (raw === 'true') raw = 'light';
          var allowed = { 'default': 1, 'light': 1, 'blue': 1, 'orange': 1, 'green': 1, 'magenta': 1 };
          var theme = allowed[raw] ? raw : 'default';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (_) {}
      })();
      (function() {
        // Force preview to always load latest: on localhost, unregister service worker
        // so cached old app (no stars, no random mode) is never served.
        if (typeof window === 'undefined' || window.location.hostname !== 'localhost') return;
        if (!('serviceWorker' in navigator)) return;
        var key = 'python-exercises-sw-cleared';
        if (sessionStorage.getItem(key)) return;
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          if (regs.length === 0) return;
          Promise.all(regs.map(function(r) { return r.unregister(); })).then(function() {
            sessionStorage.setItem(key, '1');
            window.location.reload();
          });
        });
      })();
    </script>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Python Exercises Learn v1.1</title>
    
    <!-- PWA & iOS Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Python Exercises Learn">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968350.png">

    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap');
        html, body {
            overscroll-behavior-y: none;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            padding-bottom: env(safe-area-inset-bottom, 0);
            -webkit-overflow-scrolling: touch;
        }
        /* iOS PWA: env(safe-area-inset-top) often 0 - force padding so nav clears status bar (4rem for Dynamic Island) */
        @media (display-mode: standalone), (display-mode: minimal-ui) {
            body {
                padding-top: max(4rem, env(safe-area-inset-top, 4rem));
            }
        }
        .code-font {
            font-family: 'Fira Code', monospace;
        }
        .glass {
            background: rgba(30, 41, 59, 0.88);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-settings {
            background: rgba(30, 41, 59, 0.001);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .evolution-gradient {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
        }
        /* Mobile specific adjustments */
        @media (max-width: 640px) {
            .container {
                padding-left: 1rem;
                padding-right: 1rem;
            }
        }
        /* Force mobile layout in Cursor preview if viewport is large */
        @media (min-width: 641px) and (max-width: 800px) {
            body {
                max-width: 390px;
                margin: 0 auto;
            }
        }
        /* Light mode: user can select via Settings → Theme (White mode) */
        [data-theme="light"] body {
            background-color: #f8fafc;
            color: #0f172a;
        }
        [data-theme="light"] .glass {
            background: rgba(241, 245, 249, 0.95);
            border: 1px solid rgba(15, 23, 42, 0.1);
        }
        [data-theme="light"] .glass-settings {
            background: rgba(241, 245, 249, 0.98);
            border: 1px solid rgba(15, 23, 42, 0.1);
        }
        /* Force dark text in light theme for clear contrast */
        [data-theme="light"] .text-slate-200,
        [data-theme="light"] .text-slate-300,
        [data-theme="light"] .text-slate-400 {
            color: #1e293b !important;
        }
        [data-theme="light"] .text-slate-500 {
            color: #334155 !important;
        }
        [data-theme="light"] .text-white {
            color: #0f172a !important;
        }
        /* Question logic panel stays dark with white text in all themes */
        .question-logic-panel,
        [data-theme="light"] .question-logic-panel {
            background-color: #1e293b !important;
        }
        .question-logic-panel .text-white,
        .question-logic-panel p,
        .question-logic-panel h2,
        [data-theme="light"] .question-logic-panel .text-white,
        [data-theme="light"] .question-logic-panel p,
        [data-theme="light"] .question-logic-panel h2 {
            color: #f8fafc !important;
        }

        /* Color themes (keep readable, dark UI with a colored background tint) */
        [data-theme="blue"] body { background-color: #0b1220; color: #f8fafc; }
        [data-theme="orange"] body { background-color: #1a0f0a; color: #f8fafc; }
        [data-theme="green"] body { background-color: #07140d; color: #f8fafc; }
        [data-theme="magenta"] body { background-color: #140714; color: #f8fafc; }

        [data-theme="blue"] .glass { background: rgba(15, 23, 42, 0.88); border-color: rgba(59, 130, 246, 0.18); }
        [data-theme="orange"] .glass { background: rgba(30, 41, 59, 0.82); border-color: rgba(249, 115, 22, 0.18); }
        [data-theme="green"] .glass { background: rgba(15, 23, 42, 0.86); border-color: rgba(16, 185, 129, 0.18); }
        [data-theme="magenta"] .glass { background: rgba(15, 23, 42, 0.86); border-color: rgba(255, 0, 255, 0.2); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
